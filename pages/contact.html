    <!-- Contact -->
<section id="contact" class="container mt-5 text-center">
  <h1 class="mb-4">Let's get in touch</h1>

  <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#contactModal">
    Send a message
  </button>

  <p id="message" class="mt-3"></p>
</section>


<!-- MODAL COM FORM -->
<div class="modal fade" id="contactModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Send a message</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <form id="contactForm">
        <div class="modal-body">

          <input type="text" id="name" class="form-control mb-3" placeholder="Your name">

          <input type="email" id="email" class="form-control mb-3" placeholder="Your email">

          <textarea id="userMessage" class="form-control" rows="4" placeholder="Your message"></textarea>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-dark">Send</button>
        </div>
      </form>

    </div>
  </div>
</div>
