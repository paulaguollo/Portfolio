  <main class="main">

    <!-- Contact -->
    <section id="contact">
      <h1>Let's get in touch</h1>
      <p>Feel free to reach out for collaborations, opportunities, or just to say hello.</p>

      <!-- Trigger Modal -->
      <button type="button" class="btn" data-bs-toggle="modal" data-bs-target="#contactModal">
        Send a message
      </button>
    </section>

    <!-- Modal -->
    <div class="modal fade" id="contactModal" tabindex="-1" aria-labelledby="contactModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="contactModalLabel">Send a message</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="contactEmail" class="form-label">Email</label>
              <input type="email" class="form-control" id="contactEmail" placeholder="Your email address">
            </div>
            <div class="mb-3">
              <label for="contactMessage" class="form-label">Message</label>
              <textarea class="form-control" id="contactMessage" rows="4" placeholder="Write your message here..."></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn" id="sendMessageBtn">Send Message</button>
          </div>
        </div>
      </div>
    </div>

  </main>
